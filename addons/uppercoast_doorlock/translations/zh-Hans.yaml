configuration:
  local_ip:
    name: 门禁网本机 IP
    description: HA 主机在门禁网络中的 IP 地址，必须真实配置在 HA 主机网卡上。
  local_id:
    name: 房号室内机 ID
    description: 虚拟室内机 ID，例如 1栋A座1601 当前使用 00010116010。
  building_id:
    name: 楼栋
    description: |
      请在上方文本框中输入楼栋代码（注意区分大小写）。
      可选值：1A、1B、1C、1D、1E、2A、2B、2C。
      保存并重启 Addon 后自动加载该楼栋的门口机配置。
  api_host:
    name: 后端接口监听地址
    description: 后端 HTTP 接口监听地址，通常保持 0.0.0.0。
  api_port:
    name: 后端接口监听端口
    description: 后端 HTTP 接口监听端口，默认 8099。
  api_token:
    name: 后端接口访问令牌
    description: 接听、解锁等动作接口使用的 Bearer token。为空时动作接口不可用。
  custom_device_overrides:
    name: 自定义号机覆盖
    description: "格式：号机编号:IP地址，例如 01:192.168.16.224。只添加需要覆盖的号机，留空使用楼栋预设。Addon 启动时会自动校验号机是否属于当前楼栋，不合法项会被忽略并记录日志。"
