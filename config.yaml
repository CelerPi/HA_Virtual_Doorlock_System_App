name: "Virtual Doorlock System"
version: "0.1.8"
slug: "virtual_doorlock"
description: "麦驰可视对讲门禁系统 Home Assistant App。运行虚拟室内机、呼叫监听、接听和解锁服务。"
url: "https://github.com/CelerPi/HA_Virtual_Doorlock_System_App"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
host_network: true
homeassistant_api: true
options:
  building_id: "1A"
  # building_id 为楼栋代码，可选值：1A~1E、2A~2C
  local_id: "00010116010"
  local_ip: "192.168.16.64"
  # 以下三个 IP 为小区固定地址，通常无需修改：
  # 中心地址 192.168.16.2 | 物业中心机 192.168.16.3
  # 如需修改，请编辑 app/vds/config.py 中的 DEFAULT_* 常量后重新安装 App
  api_host: "0.0.0.0"
  api_port: 8099
  api_token: "1234"
  custom_device_overrides: []
schema:
  building_id: str
  local_id: str
  local_ip: str
  # center_ip / property_center_ip 已内置默认值，不在配置页显示
  api_host: str
  api_port: int(1,65535)
  api_token: password
  custom_device_overrides:
    - str
